spring.application.name=online-exam-system
debug=false
server.port=${SERVER_PORT:8080}

spring.datasource.url=${EXAM_DB_URL:jdbc:h2:file:./data/examdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.driver-class-name=${EXAM_DB_DRIVER:org.h2.Driver}
spring.datasource.username=${EXAM_DB_USERNAME:sa}
spring.datasource.password=${EXAM_DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}

app.cors.allowed-origins=${FRONTEND_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
server.servlet.session.timeout=${SESSION_TIMEOUT:90m}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:lax}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.error.include-message=never

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

logging.level.root=INFO
logging.level.org.hibernate.SQL=INFO
